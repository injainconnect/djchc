<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - DJCHC Hyderabad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/themes.css">
    <script>(function(){try{var t=localStorage.getItem("djchc-theme")||"heritage",l=localStorage.getItem("djchc-layout")||"classic";var e=document.documentElement;e.setAttribute("data-theme",t);e.setAttribute("data-layout",l);}catch(x){}})();</script>
</head>
<body>
    <nav id="common-nav"></nav>

    <div class="banner">
        <h1><i class="fas fa-newspaper"></i> News & Updates</h1>
        <p>Stay connected with DJCHC community events and announcements</p>
    </div>

    <div class="container">
        <section>
            <h2>Latest News</h2>
            <div id="news-list">
                <p class="news-status"><i class="fas fa-spinner fa-spin"></i> Loading news&hellip;</p>
            </div>
        </section>
    </div>

    <footer id="common-footer"></footer>
    <script src="js/common.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/news.js"></script>
</body>
</html>
