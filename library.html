<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - DJCHC Hyderabad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/themes.css">
    <script>(function(){try{var t=localStorage.getItem("djchc-theme")||"aurora",l=localStorage.getItem("djchc-layout")||"focus";var e=document.documentElement;e.setAttribute("data-theme",t);e.setAttribute("data-layout",l);}catch(x){}})();</script>
</head>
<body>
    <nav id="common-nav"></nav>

    <div class="banner">
        <h1><i class="fas fa-book"></i> Library</h1>
        <p>Explore sacred Digambar Jain literature and scriptures</p>
    </div>

    <div class="container">
        <section>
            <h2>Digambar Jain Books Collection</h2>
            <div class="book-grid" id="library-list">
                <p class="library-status" style="color:#666">Loading library...</p>
            </div>
        </section>
    </div>

    <footer id="common-footer"></footer>
    <script src="js/common.js"></script>
    <script src="js/library.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
