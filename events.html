<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🙏</text></svg>">
    <meta name="description" content="Upcoming events at DJCHC Hyderabad — festivals, poojas, pravachans, community gatherings, and cultural programs for the Digambar Jain community.">
    <title>Events - DJCHC Hyderabad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/themes.css">
    <script>(function(){try{var t=localStorage.getItem("djchc-theme")||"aurora",l=localStorage.getItem("djchc-layout")||"focus";var e=document.documentElement;e.setAttribute("data-theme",t);e.setAttribute("data-layout",l);}catch(x){}})();</script>
</head>
<body>
    <nav id="common-nav"></nav>

    <div class="banner">
        <h1><i class="fas fa-calendar-alt"></i> Events</h1>
        <p>Upcoming events at DJCHC Hyderabad</p>
    </div>

    <div class="container">
        <section>
            <p class="events-intro">Join us for pravachans, parvas, seva drives and community gatherings. All are welcome. <span lang="hi">सभी सादर आमंत्रित हैं।</span></p>
            <div id="events-list">
                <p class="news-status"><i class="fas fa-spinner fa-spin"></i> Loading events&hellip;</p>
            </div>
        </section>
    </div>

    <footer id="common-footer"></footer>
    <script src="js/common.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/events.js"></script>
</body>
</html>
